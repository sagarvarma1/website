<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Sagar Varma</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #fff;
            color: #4b3f37;
            font-family: 'EB Garamond', serif;
            line-height: 1.6;
        }

        .desktop-nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1rem;
            z-index: 1000;
            text-align: center;
        }

        .desktop-nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 0;
            padding: 0;
        }

        .desktop-nav a {
            text-decoration: none;
            color: #4b3f37;
            font-size: 1.5rem;
            padding: 0.5rem 1rem;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .desktop-nav a:hover {
            border-color: #4b3f37;
            border-radius: 4px;
        }

        .desktop-nav a.active {
            color: #3b2f27;
        }

        .desktop-nav ul li:has(a.active) {
            display: none;
        }

        .mobile-header {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 0.8rem 1rem;
            z-index: 1000;
            justify-content: space-between;
            align-items: center;
            background-color: #fff;
        }

        .logo-link {
            font-family: 'EB Garamond', serif;
            font-weight: bold;
            font-size: 1.8rem;
            color: #4b3f37;
            text-decoration: none;
        }

        .hamburger-icon,
        .close-icon {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: #4b3f37;
            padding: 0;
            line-height: 1;
        }

        .hamburger-icon {
            display: none;
        }

        .mobile-menu {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            z-index: 1100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .mobile-menu.active {
            display: flex;
        }

        .mobile-menu .close-icon {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            font-size: 2.5rem;
        }

        .mobile-menu ul {
            list-style: none;
            padding: 0;
            text-align: center;
            width: 100%;
        }

        .mobile-menu li {
            margin-bottom: 2rem;
        }

        .mobile-menu a {
            font-family: 'EB Garamond', serif;
            font-size: 2rem;
            color: #4b3f37;
            text-decoration: none;
            padding: 0.5rem;
            display: block;
        }

        .mobile-menu a.active {
            text-decoration: underline;
            text-underline-offset: 5px;
        }

        .container {
            max-width: 650px;
            margin: 88px auto 40px auto;
            padding: 3rem 2rem;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            position: relative;
            display: inline-block;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background-color: #4b3f37;
        }

        .contact-details {
            margin-top: 1.5rem;
            font-size: 1.3rem;
            display: grid;
            gap: 0.8rem;
        }

        .contact-details a {
            color: inherit;
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .desktop-nav {
                display: none;
            }

            .mobile-header {
                display: flex;
            }

            .hamburger-icon {
                display: block;
            }

            .container {
                margin-top: 80px;
            }

            h1 {
                font-size: 2.5rem;
            }

            .contact-details {
                font-size: 1.15rem;
            }
        }
    </style>
</head>
<body>
    <nav class="desktop-nav" aria-label="Primary">
        <ul>
            <li><a href="landing.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="https://sagarvarma.substack.com" target="_blank" rel="noopener noreferrer">Writings</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>

    <div class="mobile-header">
        <a href="landing.html" class="logo-link">SV</a>
        <button class="hamburger-icon" aria-label="Open menu">&#9776;</button>
    </div>

    <div class="mobile-menu">
        <button class="close-icon" aria-label="Close menu">&times;</button>
        <ul>
            <li><a href="landing.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="https://sagarvarma.substack.com" target="_blank" rel="noopener noreferrer">Writings</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </div>

    <main class="container">
        <h1>Contact</h1>
        <div class="contact-details">
            <p>Email Me: <a href="mailto:sagarvarma351@gmail.com">sagarvarma351@gmail.com</a></p>
            <p>DM Me: <a href="https://x.com/thesagarvarma" target="_blank" rel="noopener noreferrer">x.com/thesagarvarma</a></p>
        </div>
    </main>

    <script>
        const hamburger = document.querySelector('.hamburger-icon');
        const closeBtn = document.querySelector('.close-icon');
        const mobileMenu = document.querySelector('.mobile-menu');

        hamburger.addEventListener('click', () => {
            mobileMenu.classList.add('active');
        });

        closeBtn.addEventListener('click', () => {
            mobileMenu.classList.remove('active');
        });

        mobileMenu.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.classList.remove('active');
            });
        });
    </script>
</body>
</html>
